<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">OCPPbasedCSO command pages</title>
  <desc id="desc">A command page layout with header, request table or form surface, filter panel, status bar, and primary send action.</desc>
